<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Baby Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#eef5fd;--card:#fff;--border:#d0e4f7;--text:#0d2b45;--muted:#5a7fa0;
  --primary:#2563eb;--primary-l:#dbeafe;--primary-m:#93c5fd;--primary-d:#1d4ed8;
  --radius:16px;--nav:62px;--safe:env(safe-area-inset-bottom,0px)
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
input,select,textarea,button{font-family:inherit;font-size:16px}
button{cursor:pointer;border:none;background:none}
a{cursor:pointer;color:var(--primary);text-decoration:none}

/* ── Core components ── */
.card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:16px;box-shadow:0 2px 8px rgba(15,45,80,.05)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:11px 20px;border-radius:12px;font-weight:600;font-size:15px;transition:all .18s;white-space:nowrap}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--primary);color:#fff;box-shadow:0 3px 10px rgba(37,99,235,.28)}
.btn-primary:hover{background:var(--primary-d)}
.btn-danger{background:#ef4444;color:#fff;box-shadow:0 2px 6px rgba(239,68,68,.25)}
.btn-ghost{background:transparent;border:1.5px solid var(--border);color:var(--text)}
.btn-ghost:hover{background:var(--bg)}
.btn-sm{padding:7px 14px;font-size:13px;border-radius:9px}
.input{width:100%;padding:10px 13px;border:1.5px solid var(--border);border-radius:11px;background:#fff;color:var(--text);outline:none;transition:border-color .15s,box-shadow .15s;line-height:1.4}
.input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.input::placeholder{color:#aabdce}
label{font-size:13px;font-weight:600;color:var(--muted);display:block;margin-bottom:6px;letter-spacing:.01em}
.field{margin-bottom:16px}
.badge{display:inline-flex;align-items:center;gap:3px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.02em}
.badge-admin{background:#fef3c7;color:#92400e}
.badge-member{background:var(--primary-l);color:var(--primary-d)}

/* ── Spinner ── */
.spinner{width:34px;height:34px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Toast ── */
#toast{position:fixed;bottom:calc(var(--nav) + var(--safe) + 14px);left:50%;transform:translateX(-50%) translateY(12px);background:#0d2b45;color:#fff;padding:10px 20px;border-radius:12px;font-size:14px;font-weight:500;opacity:0;transition:all .25s;pointer-events:none;z-index:9999;white-space:nowrap;box-shadow:0 6px 20px rgba(0,0,0,.22)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── Bottom nav ── */
#nav{position:fixed;bottom:0;left:0;right:0;height:calc(var(--nav) + var(--safe));background:#fff;border-top:1px solid var(--border);display:flex;align-items:flex-start;z-index:200;box-shadow:0 -4px 16px rgba(15,45,80,.07)}
#nav button{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-size:11px;font-weight:500;color:var(--muted);padding:10px 0 0;height:var(--nav);transition:color .15s}
#nav button.active{color:var(--primary);font-weight:700}
#nav button span.icon{font-size:21px;line-height:1}

/* ── Sticky header ── */
.sticky-header{position:sticky;top:0;z-index:100;background:#fff;border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:10px;box-shadow:0 2px 10px rgba(15,45,80,.06)}
.sticky-header .hd-title{font-weight:700;font-size:16px;line-height:1.2}
.sticky-header .hd-sub{font-size:12px;color:var(--muted);margin-top:1px}
.hd-back{font-size:22px;color:var(--muted);padding:4px 6px;margin-left:-6px;border-radius:8px}
.hd-back:hover{background:var(--bg)}

/* ── Main scroll area ── */
#main{padding:16px;padding-bottom:calc(var(--nav) + var(--safe) + 8px)}

/* ── Section title ── */
.section-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin:20px 0 10px}
.section-title:first-child{margin-top:0}

/* ── Date nav ── */
.date-nav{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.date-nav .date-label{flex:1;text-align:center;font-weight:700;font-size:16px}
.date-nav .btn-ghost{min-width:38px;padding:8px 10px;font-size:16px}

/* ── Glance bar ── */
.glance{display:flex;gap:8px;overflow-x:auto;padding:2px 0 12px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.glance::-webkit-scrollbar{display:none}
.glance-item{flex:0 0 auto;background:#fff;border:1px solid var(--border);border-radius:12px;padding:9px 14px;text-align:center;min-width:70px}
.glance-item .g-val{font-size:17px;font-weight:700}
.glance-item .g-lbl{font-size:10px;color:var(--muted);margin-top:2px;font-weight:500}

/* ── Baby grid ── */
.baby-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
@media(max-width:480px){.baby-grid{grid-template-columns:1fr}}

/* ── Baby card ── */
.baby-card{border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);background:#fff;box-shadow:0 2px 10px rgba(15,45,80,.06)}
.baby-card-head{padding:13px 14px;display:flex;align-items:flex-start;gap:10px}
.baby-card-head .b-emoji{font-size:26px;line-height:1;flex-shrink:0;margin-top:1px}
.baby-card-head .b-info{flex:1;min-width:0}
.baby-card-head .bname{font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.baby-chips{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px}
.baby-chips span{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600}
/* color swatches */
.color-swatches{display:flex;gap:5px;margin-top:7px;flex-wrap:wrap}
.color-swatch{width:16px;height:16px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .15s,border-color .15s;flex-shrink:0}
.color-swatch:hover{transform:scale(1.2)}
.color-swatch.active{border-color:#0d2b45;transform:scale(1.15)}

/* ── Log ── */
.baby-log{max-height:170px;overflow-y:auto;padding:0 14px;scrollbar-width:thin}
.log-entry{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px}
.log-entry:last-child{border-bottom:none}
.log-time{color:var(--muted);min-width:40px;font-size:12px;font-weight:500}
.log-desc{flex:1;line-height:1.3}
.del-btn{color:#ef4444;font-size:18px;line-height:1;padding:3px 5px;border-radius:6px;flex-shrink:0;opacity:.7;transition:opacity .15s}
.del-btn:hover{opacity:1}
.log-empty{padding:14px;text-align:center;color:var(--muted);font-size:13px}

/* ── Add entry area ── */
.add-area{padding:12px 14px;border-top:1px solid var(--border);background:#f5f9ff}
.type-pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.pill{padding:6px 12px;border-radius:20px;font-size:12px;font-weight:600;border:1.5px solid var(--border);background:#fff;color:var(--muted);transition:all .15s;white-space:nowrap}
.pill.active{background:var(--primary);color:#fff;border-color:var(--primary);box-shadow:0 2px 6px rgba(37,99,235,.25)}
.add-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.add-row .input{padding:9px 11px}

/* ── Auth ── */
.auth-bg{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(155deg,#1e3a8a 0%,#2563eb 55%,#60a5fa 100%);padding:20px}
.auth-card{background:#fff;border-radius:24px;padding:36px 28px;width:100%;max-width:400px;box-shadow:0 28px 64px rgba(0,0,0,.18)}
.auth-logo{text-align:center;margin-bottom:18px}
.auth-logo span{font-size:44px}
.auth-card h1{font-size:24px;font-weight:800;margin-bottom:4px;color:var(--text)}
.auth-card .sub{color:var(--muted);font-size:14px;margin-bottom:24px}
.auth-tabs{display:flex;gap:4px;background:var(--bg);border-radius:11px;padding:4px;margin-bottom:22px}
.auth-tab{flex:1;padding:9px;border-radius:8px;font-size:14px;font-weight:600;color:var(--muted);text-align:center;cursor:pointer;transition:all .18s}
.auth-tab.active{background:#fff;color:var(--primary);box-shadow:0 1px 5px rgba(0,0,0,.1)}
.invite-banner{background:#dbeafe;border:1px solid var(--primary-m);border-radius:12px;padding:13px;margin-bottom:18px;font-size:14px;color:var(--primary-d);line-height:1.5}

/* ── Families screen ── */
.fam-screen{min-height:100vh;background:var(--bg)}
.fam-header{background:#fff;border-bottom:1px solid var(--border);padding:16px 18px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(15,45,80,.05)}
.fam-header-left h2{font-size:17px;font-weight:700}
.fam-header-left p{font-size:13px;color:var(--muted);margin-top:1px}
.fam-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;padding:16px}
@media(max-width:480px){.fam-grid{grid-template-columns:1fr}}
.fam-card{background:#fff;border:1.5px solid var(--border);border-radius:var(--radius);padding:20px 16px;cursor:pointer;transition:all .18s;box-shadow:0 2px 6px rgba(15,45,80,.05)}
.fam-card:hover{box-shadow:0 6px 20px rgba(37,99,235,.12);border-color:var(--primary-m);transform:translateY(-2px)}
.fam-card .fam-icon{font-size:28px;margin-bottom:8px}
.fam-card .fam-name{font-weight:700;font-size:15px}
.fam-card .fam-badge{margin-top:8px}
.fam-card.new-card{border-style:dashed;border-color:var(--primary-m);background:var(--primary-l);text-align:center;color:var(--primary)}
.fam-card.new-card .new-plus{font-size:32px;margin-bottom:6px}

/* ── Setup ── */
.setup-screen{min-height:100vh;background:var(--bg);padding:20px 16px 40px}
.setup-inner{max-width:520px;margin:0 auto}
.setup-header{margin-bottom:24px}
.setup-header h2{font-size:22px;font-weight:800}
.setup-header p{color:var(--muted);font-size:14px;margin-top:4px}
.baby-row-card{margin-bottom:12px}

/* ── Growth ── */
.meas-table{width:100%;border-collapse:collapse;font-size:13px}
.meas-table th{text-align:left;padding:8px 10px;background:var(--bg);border-bottom:1.5px solid var(--border);font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;font-weight:700}
.meas-table td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
.add-form-row{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;margin-top:14px;padding-top:14px;border-top:1px solid var(--border)}
.add-form-row .input{padding:9px 11px}

/* ── Summary ── */
.sum-table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:16px}
.sum-table th,.sum-table td{padding:8px 10px;border-bottom:1px solid var(--border);text-align:left}
.sum-table th{font-size:11px;color:var(--muted);text-transform:uppercase;background:var(--bg);font-weight:700}
.sum-table tbody tr:hover{background:#f8fbff}
.bar-wrap{display:flex;align-items:center;gap:6px}
.bar{height:13px;border-radius:4px;min-width:3px;transition:width .3s}

/* ── Settings ── */
.member-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.member-row:last-child{border-bottom:none}
.member-avatar{width:40px;height:40px;border-radius:50%;background:var(--primary-l);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.member-info{flex:1;min-width:0}
.member-name{font-weight:600;font-size:14px}
.member-email{font-size:12px;color:var(--muted);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.invite-link-box{background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:12px;font-size:12px;word-break:break-all;color:var(--primary);margin-top:10px;line-height:1.6}
.settings-actions{display:flex;gap:10px;margin-top:24px;flex-wrap:wrap}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast"></div>

<script>
const SUPA_URL = 'https://tirlgduldbslrjgudptf.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpcmxnZHVsZGJzbHJqZ3VkcHRmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwNzcyMjMsImV4cCI6MjA5NjY1MzIyM30.knViowskPddq6y-MqLE0VAihe305Rkpct437yIUuSXI';
const BASE_URL = 'https://rafehjeelani.github.io/baby-tracker';

// ── Color themes for baby card headers ──────────────────────
const BABY_COLORS = [
  {id:'pink',   l:'#fdf2f8',m:'#f9a8d4',d:'#9d174d', label:'Pink'},
  {id:'blue',   l:'#eff6ff',m:'#93c5fd',d:'#1e40af', label:'Blue'},
  {id:'mint',   l:'#f0fdf4',m:'#6ee7b7',d:'#065f46', label:'Mint'},
  {id:'peach',  l:'#fff7ed',m:'#fdba74',d:'#9a3412', label:'Peach'},
  {id:'purple', l:'#faf5ff',m:'#c4b5fd',d:'#5b21b6', label:'Purple'},
  {id:'sky',    l:'#f0f9ff',m:'#7dd3fc',d:'#0369a1', label:'Sky'},
  {id:'rose',   l:'#fff1f2',m:'#fda4af',d:'#9f1239', label:'Rose'},
  {id:'sage',   l:'#f0fdf4',m:'#86efac',d:'#14532d', label:'Sage'},
];

const DEFAULT_COLORS = ['pink','blue','mint','peach','purple','sky','rose','sage'];

function getBabyColor(babyId, idx) {
  const id = S.babyColors[babyId] || DEFAULT_COLORS[idx % DEFAULT_COLORS.length];
  return BABY_COLORS.find(c=>c.id===id) || BABY_COLORS[0];
}

// ── State ────────────────────────────────────────────────────
let S = {
  screen:'loading', authMode:'signin', user:null, profile:null,
  families:[], family:null, members:[], babies:[],
  entries:{}, meas:{}, vax:{}, notes:{},
  curDate:today(), selType:{}, tab:'daily',
  pendingInvite:null, invitePreview:null,
  babyColors: JSON.parse(localStorage.getItem('bt_colors')||'{}')
};

// ── Helpers ──────────────────────────────────────────────────
function app(){ return document.getElementById('app'); }
function today(){
  const d=new Date();
  return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
}
function pad(n){ return String(n).padStart(2,'0'); }
function fmtDate(d){
  if(d===today()) return 'Today';
  const dt=new Date(d+'T00:00:00');
  return dt.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
}
function nowTime(){
  const d=new Date(); return pad(d.getHours())+':'+pad(d.getMinutes());
}
let _tt;
function toast(msg,dur=3000){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(_tt); _tt=setTimeout(()=>t.classList.remove('show'),dur);
}
function debounce(fn,ms){let t;return(...a)=>{clearTimeout(t);t=setTimeout(()=>fn(...a),ms);};}
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function htmlToEl(html){ const d=document.createElement('div');d.innerHTML=html;return d.firstChild; }

const TYPES=[
  {k:'milk',    icon:'🍼',label:'Milk'},
  {k:'urine',   icon:'💧',label:'Urine'},
  {k:'potty',   icon:'💩',label:'Potty'},
  {k:'vitamin', icon:'💊',label:'Vitamin'},
  {k:'medicine',icon:'🩹',label:'Medicine'}
];
const BABY_EMOJIS=['🌸','⭐','🐻','🦋','🌺','🚀','🐣','🦁','🌼','🐧','🍒','🎀'];
const CHART_COLORS=['#3b82f6','#ec4899','#10b981','#f59e0b','#8b5cf6'];

// ── Supabase ─────────────────────────────────────────────────
let sb;
function initSupa(){ sb=supabase.createClient(SUPA_URL,SUPA_KEY); }

async function loadProfile(){
  const {data,error}=await sb.from('profiles').select('*').eq('id',S.user.id).single();
  if(error) throw error;
  S.profile=data;
}
async function loadFamilies(){
  const {data,error}=await sb.from('family_members').select('role,families(*)').eq('user_id',S.user.id);
  if(error) throw error;
  S.families=(data||[]).map(r=>({...r.families,myRole:r.role}));
}
async function openFamily(fam){
  S.family=fam; S.tab='daily'; S.entries={}; S.meas={}; S.vax={}; S.notes={};
  await Promise.all([loadMembers(),loadBabies()]);
  await Promise.all([loadEntries(S.curDate),loadMeasurements(),loadVaccines()]);
  show('tracker');
}
async function createFamily(name,babies){
  const {data,error}=await sb.rpc('create_family',{p_name:name,p_babies:babies});
  if(error) throw error;
  if(data&&data.error) throw new Error(data.error);
  await loadFamilies();
  const fam=S.families.find(f=>f.id===data.family_id);
  await openFamily(fam||{id:data.family_id,name,myRole:'admin'});
}
async function loadMembers(){
  const {data,error}=await sb.from('family_members').select('id,role,user_id,profiles(id,full_name,email,avatar)').eq('family_id',S.family.id);
  if(error) throw error;
  S.members=(data||[]).map(r=>({...r.profiles,memberId:r.id,role:r.role}));
}
async function loadBabies(){
  const {data,error}=await sb.from('babies').select('*').eq('family_id',S.family.id).order('created_at');
  if(error) throw error;
  S.babies=data||[];
}
async function addBaby(name,emoji,dob){
  const {error}=await sb.from('babies').insert({family_id:S.family.id,name,emoji,dob:dob||null});
  if(error) throw error;
  await loadBabies();
}
async function deleteBaby(id){
  if(!confirm('Delete this baby and all their data?')) return;
  const {error}=await sb.from('babies').delete().eq('id',id);
  if(error) throw error;
  await loadBabies(); toast('Baby removed');
}
async function removeMember(memberId,userId){
  if(userId===S.user.id){toast('Leave via Switch Family');return;}
  if(!confirm('Remove this member?')) return;
  const {error}=await sb.from('family_members').delete().eq('id',memberId);
  if(error) throw error;
  await loadMembers(); toast('Member removed');
}
async function loadEntries(date){
  const {data,error}=await sb.from('entries').select('*').eq('family_id',S.family.id).eq('date',date).order('time');
  if(error) throw error;
  if(!S.entries[date]) S.entries[date]={};
  S.babies.forEach(b=>{ S.entries[date][b.id]=(data||[]).filter(e=>e.baby_id===b.id); });
}
async function addEntry(babyId,type,time,ml,note){
  const {error}=await sb.from('entries').insert({baby_id:babyId,family_id:S.family.id,date:S.curDate,time,type,ml:ml||null,note:note||null,created_by:S.user.id});
  if(error) throw error;
  await loadEntries(S.curDate);
}
async function deleteEntry(id,babyId){
  const {error}=await sb.from('entries').delete().eq('id',id);
  if(error) throw error;
  const d=S.curDate;
  if(S.entries[d]&&S.entries[d][babyId]) S.entries[d][babyId]=S.entries[d][babyId].filter(e=>e.id!==id);
}
async function loadMeasurements(){
  const {data,error}=await sb.from('measurements').select('*').eq('family_id',S.family.id).order('date',{ascending:false});
  if(error) throw error;
  S.meas={}; S.babies.forEach(b=>{ S.meas[b.id]=(data||[]).filter(m=>m.baby_id===b.id); });
}
async function addMeasurement(babyId,date,mtype,value){
  const {error}=await sb.from('measurements').insert({baby_id:babyId,family_id:S.family.id,date,mtype,value,created_by:S.user.id});
  if(error) throw error;
  await loadMeasurements();
}
async function deleteMeasurement(id,babyId){
  const {error}=await sb.from('measurements').delete().eq('id',id);
  if(error) throw error;
  if(S.meas[babyId]) S.meas[babyId]=S.meas[babyId].filter(m=>m.id!==id);
}
async function loadVaccines(){
  const {data,error}=await sb.from('vaccines').select('*').eq('family_id',S.family.id).order('date',{ascending:false});
  if(error) throw error;
  S.vax={}; S.babies.forEach(b=>{ S.vax[b.id]=(data||[]).filter(v=>v.baby_id===b.id); });
}
async function addVaccine(babyId,date,name,note){
  const {error}=await sb.from('vaccines').insert({baby_id:babyId,family_id:S.family.id,date,name,note:note||null,created_by:S.user.id});
  if(error) throw error;
  await loadVaccines();
}
async function deleteVaccine(id,babyId){
  const {error}=await sb.from('vaccines').delete().eq('id',id);
  if(error) throw error;
  if(S.vax[babyId]) S.vax[babyId]=S.vax[babyId].filter(v=>v.id!==id);
}
async function loadNote(date){
  if(S.notes[date]!==undefined) return;
  const {data}=await sb.from('daily_notes').select('content').eq('family_id',S.family.id).eq('date',date).maybeSingle();
  S.notes[date]=data?data.content:'';
}
async function saveNote(date,content){
  S.notes[date]=content;
  const {error}=await sb.from('daily_notes').upsert({family_id:S.family.id,date,content,updated_by:S.user.id,updated_at:new Date().toISOString()},{onConflict:'family_id,date'});
  if(error) toast('Note save failed');
}
async function generateInvite(){
  const {data,error}=await sb.from('invitations').insert({family_id:S.family.id,invited_by:S.user.id,role:'member'}).select('token').single();
  if(error) throw error;
  return `${BASE_URL}?invite=${data.token}`;
}
async function loadInvitePreview(token){
  const {data}=await sb.from('invitations').select('families(name)').eq('token',token).eq('status','pending').maybeSingle();
  if(data&&data.families) S.invitePreview={familyName:data.families.name};
}
async function acceptInvite(token){
  const {data,error}=await sb.rpc('accept_invitation',{invite_token:token});
  if(error) throw error;
  if(data&&data.error) throw new Error(data.error);
  return data;
}

function renderForgotForm(){
  return `<div class="field"><label>Email address</label><input class="input" id="af-email" type="email" placeholder="you@email.com" autocomplete="email"/></div>
  <button class="btn btn-primary" style="width:100%" id="af-send">Send Reset Email</button>
  <div style="text-align:center;margin-top:14px;font-size:14px"><a onclick="S.authMode='signin';renderApp()">← Back to Sign In</a></div>`;

function renderAuthForm(){
  const isIn=S.authMode==='signin';
  return `<div class="auth-tabs">
    <div class="auth-tab ${isIn?'active':''}" onclick="S.authMode='signin';renderApp()">Sign In</div>
    <div class="auth-tab ${!isIn?'active':''}" onclick="S.authMode='signup';renderApp()">Create Account</div>
  </div>
  ${!isIn?`<div class="field"><label>Full Name</label><input class="input" id="af-name" type="text" placeholder="Jane Doe" autocomplete="name"/></div>`:''}
  <div class="field"><label>Email address</label><input class="input" id="af-email" type="email" placeholder="you@email.com" autocomplete="email"/></div>
  <div class="field"><label>Password</label><input class="input" id="af-pass" type="password" placeholder="••••••••" autocomplete="${isIn?'current-password':'new-password'}"/></div>
  <button class="btn btn-primary" style="width:100%;margin-top:4px;padding:13px" id="af-submit">${isIn?'Sign In':'Create Account'}</button>
  ${isIn?`<div style="text-align:center;margin-top:14px;font-size:14px"><a onclick="S.authMode='forgot';renderApp()">Forgot password?</a></div>`:''}`;
}
function bindAuthEvents(){
  const onKey=e=>{if(e.key==='Enter'){document.getElementById('af-submit')?.click();document.getElementById('af-send')?.click();}};
  document.querySelectorAll('.auth-card input').forEach(i=>i.addEventListener('keydown',onKey));
  const send=document.getElementById('af-send');
  if(send) send.onclick=async()=>{
    const email=document.getElementById('af-email').value.trim();
    if(!email){toast('Enter your email');return;}
    const {error}=await sb.auth.resetPasswordForEmail(email,{redirectTo:BASE_URL});
    if(error){toast(error.message);return;}
    toast('Reset email sent — check your inbox');
  };
  const sub=document.getElementById('af-submit');
  if(!sub) return;
  sub.onclick=async()=>{
    const email=document.getElementById('af-email')?.value.trim()||'';
    const pass=document.getElementById('af-pass')?.value||'';
    if(!email||!pass){toast('Please fill all fields');return;}
    sub.disabled=true; sub.textContent='…';
    if(S.authMode==='signin'){
      const {error}=await sb.auth.signInWithPassword({email,password:pass});
      if(error){toast(error.message);sub.disabled=false;sub.textContent='Sign In';return;}
    } else {
      const name=document.getElementById('af-name')?.value.trim()||'';
      const {error}=await sb.auth.signUp({email,password:pass,options:{data:{full_name:name}}});
      if(error){toast(error.message);sub.disabled=false;sub.textContent='Create Account';return;}
      document.querySelector('.auth-card').innerHTML=`<div style="text-align:center;padding:16px 0"><div style="font-size:52px;margin-bottom:14px">📧</div><h2 style="font-size:20px;font-weight:800;margin-bottom:8px">Check your email</h2><p style="color:var(--muted);font-size:14px;line-height:1.6">We sent a confirmation link to<br><strong>${esc(email)}</strong></p><a onclick="S.authMode='signin';renderApp()" style="display:inline-block;margin-top:18px;font-size:14px">← Back to Sign In</a></div>`;
    }
  };
}

function bindSetupEvents(emojiOpts){
  let count=2;
  document.getElementById('add-baby-row').onclick=()=>{
    if(count>=5){toast('Maximum 5 babies');return;}
    const d=document.createElement('div'); d.innerHTML=babyRowHTML(count,emojiOpts);
    document.getElementById('baby-rows').appendChild(d.firstChild); count++;
    document.querySelectorAll('.br-remove').forEach(b=>b.onclick=e=>e.target.closest('.baby-row-card').remove());
  };
  document.querySelectorAll('.br-remove').forEach(b=>b.onclick=e=>e.target.closest('.baby-row-card').remove());
  document.getElementById('create-fam').onclick=async()=>{
    const name=document.getElementById('s-famname').value.trim();
    if(!name){toast('Enter a family name');return;}
    const rows=[...document.querySelectorAll('.baby-row-card')];
    const babies=rows.map(r=>({name:r.querySelector('.br-name').value.trim(),emoji:r.querySelector('.br-emoji').value,dob:r.querySelector('.br-dob').value||null}));

    const btn=document.getElementById('create-fam');
    btn.disabled=true; btn.textContent='Creating…';
    try{ await createFamily(name,babies); }
    catch(e){ toast(e.message); btn.disabled=false; btn.textContent='Create Family →'; }

}

function renderDateNav(){
  return `<div class="date-nav">
    <button class="btn btn-ghost btn-sm" onclick="changeDate(-1)" style="min-width:36px">‹</button>
    <div class="date-label">${fmtDate(S.curDate)}</div>
    <button class="btn btn-ghost btn-sm" onclick="changeDate(1)" style="min-width:36px">›</button>

  </div>`;

async function changeDate(d){
  const dt=new Date(S.curDate+'T00:00:00'); dt.setDate(dt.getDate()+d);
  S.curDate=dt.toISOString().split('T')[0];
  if(!S.entries[S.curDate]) await loadEntries(S.curDate);
  renderTab();
}
async function goToday(){ S.curDate=today(); if(!S.entries[S.curDate]) await loadEntries(S.curDate); renderTab(); }

function renderGlance(){
  const ents=S.entries[S.curDate]||{};
  let totalMl=0,urine=0,potty=0,all=0;
  S.babies.forEach(b=>{
    const be=ents[b.id]||[];
    totalMl+=be.filter(e=>e.type==='milk').reduce((s,e)=>s+(e.ml||0),0);
    urine+=be.filter(e=>e.type==='urine').length;
    potty+=be.filter(e=>e.type==='potty').length;
    all+=be.length;
  });
  const perBaby=S.babies.map(b=>{
    const ml=(ents[b.id]||[]).filter(e=>e.type==='milk').reduce((s,e)=>s+(e.ml||0),0);
    return `<div class="glance-item"><div class="g-val">${ml}ml</div><div class="g-lbl">${esc(b.emoji+' '+b.name)}</div></div>`;
  }).join('');
  return `<div class="glance">
    <div class="glance-item"><div class="g-val">🍼 ${totalMl}</div><div class="g-lbl">ml total</div></div>
    <div class="glance-item"><div class="g-val">💧 ${urine}</div><div class="g-lbl">urine</div></div>
    <div class="glance-item"><div class="g-val">💩 ${potty}</div><div class="g-lbl">potty</div></div>
    <div class="glance-item"><div class="g-val">${all}</div><div class="g-lbl">entries</div></div>
    ${perBaby}
  </div>`;
}

function renderBabyCard(b,idx){
  const c=getBabyColor(b.id,idx);
  const ents=(S.entries[S.curDate]||{})[b.id]||[];
  const milkMl=ents.filter(e=>e.type==='milk').reduce((s,e)=>s+(e.ml||0),0);
  const urine=ents.filter(e=>e.type==='urine').length;
  const potty=ents.filter(e=>e.type==='potty').length;
  const selType=S.selType[b.id]||'milk';
  const swatches=BABY_COLORS.map(col=>`<div class="color-swatch ${S.babyColors[b.id]===col.id||((!S.babyColors[b.id])&&col.id===DEFAULT_COLORS[idx%DEFAULT_COLORS.length])?'active':''}" style="background:${col.m}" title="${col.label}" onclick="setBabyColor('${b.id}','${col.id}')"></div>`).join('');
  const logHTML=ents.length
    ? ents.map(e=>`<div class="log-entry"><span class="log-time">${esc(e.time)}</span><span class="log-desc">${entryDesc(e)}</span><button class="del-btn" onclick="handleDelEntry('${e.id}','${b.id}')">×</button></div>`).join('')
    : `<div class="log-empty">No entries yet</div>`;
  return `<div class="baby-card" id="bc-${b.id}">
    <div class="baby-card-head" style="background:${c.m}">
      <span class="b-emoji">${b.emoji}</span>
      <div class="b-info">
        <div class="bname" style="color:${c.d}">${esc(b.name)}</div>
        <div class="baby-chips">
          <span style="background:${c.l};color:${c.d}">🍼 ${milkMl}ml</span>
          <span style="background:${c.l};color:${c.d}">💧 ${urine}</span>
          <span style="background:${c.l};color:${c.d}">💩 ${potty}</span>
        </div>
        <div class="color-swatches">${swatches}</div>
      </div>
    </div>
    <div class="baby-log">${logHTML}</div>
    ${renderAddArea(b,selType)}
  </div>`;
}

function renderAddArea(b,selType){
  const pills=TYPES.map(t=>`<button class="pill ${selType===t.k?'active':''}" onclick="setSel('${b.id}','${t.k}')">${t.icon} ${t.label}</button>`).join('');
  let extra='';
  if(selType==='milk') extra=`<input class="input" id="ml-${b.id}" type="number" placeholder="ml" min="0" style="width:76px"/>`;
  if(selType==='medicine'||selType==='vitamin') extra=`<input class="input" id="note-${b.id}" type="text" placeholder="name / dose" style="flex:1"/>`;
  return `<div class="add-area">
    <div class="type-pills">${pills}</div>
    <div class="add-row">
      <input class="input" id="time-${b.id}" type="time" value="${nowTime()}" style="width:108px"/>
      ${extra}
      <button class="btn btn-primary btn-sm" onclick="handleAddEntry('${b.id}')">＋ Add</button>
    </div>
  </div>`;
}

function entryDesc(e){
  if(e.type==='milk')     return `🍼 ${e.ml||0} ml`;
  if(e.type==='urine')    return '💧 Urine';
  if(e.type==='potty')    return '💩 Potty';
  if(e.type==='vitamin')  return `💊 ${esc(e.note||'Vitamin')}`;
  if(e.type==='medicine') return `🩹 ${esc(e.note||'Medicine')}`;
  return esc(e.type);
}
function setSel(babyId,type){ S.selType[babyId]=type; rerenderBabyCard(babyId); }
function rerenderBabyCard(babyId){
  const el=document.getElementById('bc-'+babyId);
  if(!el) return;
  const idx=S.babies.findIndex(b=>b.id===babyId);
  el.outerHTML=renderBabyCard(S.babies[idx],idx);
}
async function handleAddEntry(babyId){
  const time=document.getElementById('time-'+babyId)?.value||nowTime();
  const type=S.selType[babyId]||'milk';
  const ml=type==='milk'?parseInt(document.getElementById('ml-'+babyId)?.value||0):null;
  const note=(type==='medicine'||type==='vitamin')?document.getElementById('note-'+babyId)?.value||'':null;
  try{
    await addEntry(babyId,type,time,ml,note);
    rerenderBabyCard(babyId);
    document.querySelector('.glance')?.replaceWith(htmlToEl(renderGlance()));
  }catch(e){toast(e.message);}
}
async function handleDelEntry(id,babyId){
  try{
    await deleteEntry(id,babyId);
    rerenderBabyCard(babyId);
    document.querySelector('.glance')?.replaceWith(htmlToEl(renderGlance()));
  }catch(e){toast(e.message);}
}
function renderDailyNotes(){
  return `<div class="card" style="margin-top:14px">
    <div class="section-title" style="margin-top:0">📝 Daily Notes</div>
    <textarea class="input" id="daily-note-ta" rows="3" style="resize:vertical;line-height:1.5" placeholder="Notes for today…"></textarea>
    <div style="font-size:11px;color:var(--muted);margin-top:6px;font-weight:500">Auto-saved</div>
  </div>`;
}
function bindDailyNoteEvents(){
  const ta=document.getElementById('daily-note-ta');
  if(!ta) return;
  const save=debounce(v=>saveNote(S.curDate,v),800);
  ta.addEventListener('input',()=>save(ta.value));
}

    <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
      <span style="font-size:24px">${b.emoji}</span>
      <span style="font-weight:700;font-size:15px;color:${c.d}">${esc(b.name)}</span>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">
      ${lat.w?`<span class="badge" style="background:${c.m};color:${c.d}">⚖️ ${lat.w.value} kg</span>`:''}
      ${lat.l?`<span class="badge" style="background:${c.m};color:${c.d}">📏 ${lat.l.value} cm</span>`:''}
      ${lat.h?`<span class="badge" style="background:${c.m};color:${c.d}">🧠 ${lat.h.value} cm</span>`:''}
      ${!lat.w&&!lat.l&&!lat.h?`<span style="font-size:13px;color:var(--muted)">No measurements yet</span>`:''}
    </div>
    ${ms.length?`<div style="overflow-x:auto"><table class="meas-table"><thead><tr><th>Date</th><th>Type</th><th>Value</th><th></th></tr></thead><tbody>${rows}</tbody></table></div>`:''}
    <div class="add-form-row">
      <input class="input" id="md-${b.id}" type="date" value="${today()}" style="width:130px;flex-shrink:0"/>
      <select class="input" id="mt-${b.id}" style="width:120px;flex-shrink:0">
        <option value="weight">Weight (kg)</option>
        <option value="length">Length (cm)</option>
        <option value="head">Head (cm)</option>
      </select>
      <input class="input" id="mv-${b.id}" type="number" step="0.1" placeholder="Value" style="width:90px;flex-shrink:0"/>
      <button class="btn btn-primary btn-sm" onclick="handleAddMeas('${b.id}')">Add</button>
    </div>
  </div>`;
}
async function handleAddMeas(babyId){
  const date=document.getElementById('md-'+babyId)?.value;
  const mtype=document.getElementById('mt-'+babyId)?.value;
  const value=parseFloat(document.getElementById('mv-'+babyId)?.value);
  if(!date||!mtype||isNaN(value)){toast('Fill all fields');return;}
  try{ await addMeasurement(babyId,date,mtype,value); renderGrowth(); }
  catch(e){ toast(e.message); }
}
async function handleDelMeas(id,babyId){
  try{ await deleteMeasurement(id,babyId); renderGrowth(); }catch(e){ toast(e.message); }
}
function renderVaccineSection(){
  const all=S.babies.flatMap(b=>(S.vax[b.id]||[]).map(v=>({...v,baby:b})));
  all.sort((a,b)=>b.date.localeCompare(a.date));
  const rows=all.map(v=>`<tr>
    <td style="color:var(--muted);white-space:nowrap">${v.date}</td>
    <td>${v.baby.emoji} ${esc(v.baby.name)}</td>
    <td style="font-weight:600">${esc(v.name)}</td>
    <td style="color:var(--muted)">${esc(v.note||'')}</td>
    <td style="text-align:right"><button class="del-btn" onclick="handleDelVax('${v.id}','${v.baby_id}')">×</button></td>
  </tr>`).join('');
  const babyOpts=S.babies.map(b=>`<option value="${b.id}">${b.emoji} ${esc(b.name)}</option>`).join('');
  return `<div class="card">
    ${all.length?`<div style="overflow-x:auto;margin-bottom:14px"><table class="meas-table"><thead><tr><th>Date</th><th>Baby</th><th>Vaccine</th><th>Notes</th><th></th></tr></thead><tbody>${rows}</tbody></table></div>`:`<p style="font-size:13px;color:var(--muted);margin-bottom:14px">No vaccines recorded yet</p>`}
    <div class="add-form-row">
      <select class="input" id="vb" style="width:130px;flex-shrink:0">${babyOpts}</select>
      <input class="input" id="vd" type="date" value="${today()}" style="width:130px;flex-shrink:0"/>
      <input class="input" id="vn" type="text" placeholder="Vaccine name" style="flex:1;min-width:110px"/>
      <input class="input" id="vo" type="text" placeholder="Notes (opt)" style="flex:1;min-width:90px"/>
      <button class="btn btn-primary btn-sm" onclick="handleAddVax()">Add</button>
    </div>
  </div>`;
}
async function handleAddVax(){
  const babyId=document.getElementById('vb')?.value;
  const date=document.getElementById('vd')?.value;
  const name=document.getElementById('vn')?.value.trim();
  const note=document.getElementById('vo')?.value.trim();
  if(!babyId||!date||!name){toast('Fill required fields');return;}
  try{ await addVaccine(babyId,date,name,note); renderGrowth(); }catch(e){ toast(e.message); }
}
async function handleDelVax(id,babyId){
  try{ await deleteVaccine(id,babyId); renderGrowth(); }catch(e){ toast(e.message); }
}

// ── Summary tab ──────────────────────────────────────────────
async function renderSummary(){
  const m=document.getElementById('main');
  m.innerHTML=`<div style="display:flex;align-items:center;justify-content:center;padding:60px 0"><div class="spinner"></div></div>`;
  const dates=[];
  for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);dates.push(d.toISOString().split('T')[0]);}
  try{
    const {data,error}=await sb.from('entries').select('*').eq('family_id',S.family.id).in('date',dates).order('date');
    if(error) throw error;
    const byDate={};
    dates.forEach(d=>{byDate[d]={};S.babies.forEach(b=>byDate[d][b.id]=[]);});
    (data||[]).forEach(e=>{if(byDate[e.date]&&byDate[e.date][e.baby_id])byDate[e.date][e.baby_id].push(e);});
    const maxMl=Math.max(1,...dates.flatMap(d=>S.babies.map(b=>byDate[d][b.id].filter(e=>e.type==='milk').reduce((s,e)=>s+(e.ml||0),0))));
    const rows=dates.map(d=>{
      const cells=S.babies.map((b,bi)=>{
        const ml=byDate[d][b.id].filter(e=>e.type==='milk').reduce((s,e)=>s+(e.ml||0),0);
        const w=Math.round(ml/maxMl*72);
        return `<td><div class="bar-wrap"><div class="bar" style="width:${w}px;background:${CHART_COLORS[bi%CHART_COLORS.length]}"></div><span style="font-size:12px;font-weight:600;min-width:28px">${ml}</span></div></td>`;
      }).join('');
      const ur=S.babies.reduce((s,b)=>s+byDate[d][b.id].filter(e=>e.type==='urine').length,0);
      const po=S.babies.reduce((s,b)=>s+byDate[d][b.id].filter(e=>e.type==='potty').length,0);
      return `<tr><td style="white-space:nowrap;font-size:13px;color:var(--muted);font-weight:500">${fmtDate(d)}</td>${cells}<td style="font-weight:600">${ur}</td><td style="font-weight:600">${po}</td></tr>`;
    }).join('');
    const bThs=S.babies.map(b=>`<th>${b.emoji} ${esc(b.name)}</th>`).join('');
    const growthCards=S.babies.map((b,i)=>{
      const c=getBabyColor(b.id,i); const ms=S.meas[b.id]||[];
      const w=ms.find(m=>m.mtype==='weight'),l=ms.find(m=>m.mtype==='length'),h=ms.find(m=>m.mtype==='head');
      return `<div class="card" style="flex:1;min-width:130px">
        <div style="font-weight:700;color:${c.d};font-size:15px;margin-bottom:8px">${b.emoji} ${esc(b.name)}</div>
        ${w?`<div style="font-size:13px;padding:3px 0">⚖️ <strong>${w.value}</strong> kg</div>`:''}
        ${l?`<div style="font-size:13px;padding:3px 0">📏 <strong>${l.value}</strong> cm</div>`:''}
        ${h?`<div style="font-size:13px;padding:3px 0">🧠 <strong>${h.value}</strong> cm</div>`:''}
        ${!w&&!l&&!h?`<div style="font-size:12px;color:var(--muted)">No data yet</div>`:''}
      </div>`;
    }).join('');
    const allVax=S.babies.flatMap(b=>(S.vax[b.id]||[]).map(v=>({...v,baby:b})));
    allVax.sort((a,b)=>b.date.localeCompare(a.date));
    const vaxRows=allVax.slice(0,8).map(v=>`<li style="font-size:13px;padding:7px 0;border-bottom:1px solid var(--border);display:flex;gap:8px"><span style="color:var(--muted);font-size:12px;min-width:80px">${v.date}</span><span>${v.baby.emoji} ${esc(v.baby.name)}: <strong>${esc(v.name)}</strong></span></li>`).join('');
    m.innerHTML=`
      <div class="section-title">7-Day Feeding (ml)</div>
      <div class="card" style="overflow-x:auto;padding:0"><table class="sum-table" style="margin:0">
        <thead><tr><th>Date</th>${bThs}<th>💧</th><th>💩</th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div>
      <div class="section-title">Latest Growth</div>
      <div style="display:flex;gap:12px;flex-wrap:wrap">${growthCards}</div>
      <div class="section-title">Recent Vaccines</div>
      <div class="card"><ul style="list-style:none">${vaxRows||'<li style="font-size:13px;color:var(--muted);padding:8px 0">No vaccines recorded</li>'}</ul></div>`;
  }catch(e){m.innerHTML=`<div style="padding:20px;color:#ef4444;font-size:14px">${esc(e.message)}</div>`;}
}

// ── Settings tab ─────────────────────────────────────────────
function renderSettings(){
  const m=document.getElementById('main');
  const isAdmin=S.family.myRole==='admin';
  const memberRows=S.members.map(mem=>`<div class="member-row">
    <div class="member-avatar">${esc(mem.avatar||'👤')}</div>
    <div class="member-info">
      <div class="member-name">${esc(mem.full_name||'Unknown')}</div>
      <div class="member-email">${esc(mem.email||'')}</div>
    </div>
    <span class="badge ${mem.role==='admin'?'badge-admin':'badge-member'}">${mem.role==='admin'?'👑 Admin':'Member'}</span>
    ${isAdmin&&mem.id!==S.user.id?`<button class="btn btn-danger btn-sm" onclick="handleRemoveMember('${mem.memberId}','${mem.id}')">Remove</button>`:''}
  </div>`).join('');
  const emojiOpts=BABY_EMOJIS.map(e=>`<option value="${e}">${e}</option>`).join('');
  const babyList=S.babies.map(b=>`<div class="member-row">
    <span style="font-size:26px">${b.emoji}</span>
    <div class="member-info">
      <div class="member-name">${esc(b.name)}</div>
      <div class="member-email">${b.dob?'DOB: '+b.dob:'No date of birth set'}</div>
    </div>
    ${isAdmin?`<button class="btn btn-danger btn-sm" onclick="handleDelBaby('${b.id}')">Delete</button>`:''}
  </div>`).join('');
  m.innerHTML=`
    <div class="section-title">Members</div>
    <div class="card">${memberRows||'<p style="font-size:13px;color:var(--muted)">No members</p>'}</div>

    ${isAdmin?`
    <div class="section-title">Invite Someone</div>
    <div class="card">
      <p style="font-size:14px;color:var(--muted);margin-bottom:14px;line-height:1.5">Generate a shareable link — anyone who opens it can join this family.</p>
      <button class="btn btn-primary btn-sm" id="gen-invite-btn">Generate Invite Link</button>
      <div id="invite-result"></div>
    </div>`:''}

    <div class="section-title">Babies</div>
    <div class="card">
      ${babyList}
      ${isAdmin?`<div class="add-form-row" style="margin-top:${S.babies.length?'12px':'0'}">
        <select class="input br-emoji" id="nb-emoji" style="width:60px;padding:8px 4px;font-size:18px">${emojiOpts}</select>
        <input class="input" id="nb-name" type="text" placeholder="Name" style="flex:1;min-width:90px"/>
        <input class="input" id="nb-dob" type="date" style="width:130px;flex-shrink:0"/>
        <button class="btn btn-primary btn-sm" onclick="handleAddBaby()">Add</button>
      </div>`:''}
    </div>

    <div class="settings-actions">
      <button class="btn btn-ghost" onclick="show('families')">← Switch Family</button>
      <button class="btn btn-danger" onclick="sb.auth.signOut()">Sign Out</button>
    </div>`;

  if(isAdmin){
    document.getElementById('gen-invite-btn')?.addEventListener('click',async()=>{
      try{
        const url=await generateInvite();
        document.getElementById('invite-result').innerHTML=`
          <div class="invite-link-box">${esc(url)}</div>
          <button class="btn btn-ghost btn-sm" style="margin-top:8px" onclick="copyInvite('${esc(url)}')">Copy Link</button>`;
      }catch(e){toast(e.message);}
    });
  }
}
function copyInvite(url){
  navigator.clipboard.writeText(url).then(()=>toast('Link copied!')).catch(()=>toast('Copy failed — copy manually'));
}
async function handleRemoveMember(memberId,userId){
  try{ await removeMember(memberId,userId); renderSettings(); }catch(e){ toast(e.message); }
}
async function handleDelBaby(id){
  try{ await deleteBaby(id); renderSettings(); }catch(e){ toast(e.message); }
}
async function handleAddBaby(){
  const name=document.getElementById('nb-name')?.value.trim();
  const emoji=document.getElementById('nb-emoji')?.value||'🌸';
  const dob=document.getElementById('nb-dob')?.value||null;
  if(!name){toast('Enter baby name');return;}
  try{ await addBaby(name,emoji,dob); renderSettings(); toast('Baby added!'); }catch(e){ toast(e.message); }
}

// ── Auth state listener ───────────────────────────────────────
function listenAuth(){
  sb.auth.onAuthStateChange(async(event,session)=>{
    if(event==='SIGNED_IN'&&session){
      S.user=session.user;
      try{
        await loadProfile(); await loadFamilies();
        if(S.pendingInvite){
          try{const r=await acceptInvite(S.pendingInvite);if(r&&r.ok)toast('Joined '+r.family_name+'!');}catch(e){toast(e.message);}
          S.pendingInvite=null; await loadFamilies();
        }
        if(S.families.length===0) show('setup'); else show('families');
      }catch(e){ console.error(e); show('auth'); }
    } else if(event==='SIGNED_OUT'){
      S={...S,screen:'auth',user:null,profile:null,families:[],family:null,members:[],babies:[],entries:{},meas:{},vax:{},notes:{},tab:'daily'};
      show('auth');
    }
  });
}

// ── Boot ─────────────────────────────────────────────────────
async function boot(){
  if(checkSetup()) return;
  initSupa(); show('loading');
  const params=new URLSearchParams(window.location.search);
  const token=params.get('invite');
  if(token){ S.pendingInvite=token; await loadInvitePreview(token); }
  listenAuth();
  const {data:{session}}=await sb.auth.getSession();
  if(!session){ show('auth'); return; }
  S.user=session.user;
  try{
    await loadProfile(); await loadFamilies();
    if(S.pendingInvite){
      try{const r=await acceptInvite(S.pendingInvite);if(r&&r.ok)toast('Joined '+r.family_name+'!');}catch(e){toast(e.message);}
      S.pendingInvite=null; await loadFamilies();
    }
    if(S.families.length===0) show('setup'); else show('families');
  }catch(e){ console.error(e); show('auth'); }
}

boot();
</script>
</body>
</html>
